<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact — Nate Budzinski</title>
  <meta name="description" content="Contact Nate Budzinski — director based in Copenhagen. Available for festival enquiries, collaboration, and representation.">
  <link rel="canonical" href="https://budzinski.work/contact/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0e;
      --text:       #e8e8e4;
      --text-dim:   rgba(232, 232, 228, 0.45);
      --text-faint: rgba(232, 232, 228, 0.15);
      --accent:     #a07248;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ─────────────────────────────────────────── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.75rem 2.5rem;
      border-bottom: 1px solid var(--text-faint);
    }

    .nav-name {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-name:hover { color: var(--text); }

    .nav-links a.active { color: var(--text); }

    /* ── MAIN ────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 5rem 2.5rem 8rem;
      max-width: 680px;
    }

    .contact-block { width: 100%; }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 2.5rem;
    }

    .contact-copy {
      font-size: 1rem;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 42ch;
    }

    .email-link {
      display: inline-block;
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text-faint);
      padding-bottom: 3px;
      letter-spacing: 0.02em;
      transition: border-color 0.25s ease, color 0.25s ease;
    }

    .email-link:hover {
      color: #fff;
      border-color: var(--text-dim);
    }

    /* ── FOOTER ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--text-faint);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-note {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: rgba(232, 232, 228, 0.2);
    }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 600px) {
      nav { padding: 1.4rem 1.5rem; }
      .nav-name { display: none; }
      main { padding: 3.5rem 1.5rem 6rem; }
      footer { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-name" href="/">Nate Budzinski</a>
    <ul class="nav-links">
      <li><a href="/films/">Films</a></li>
      <li><a href="/writing/">Writing</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="/contact/" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="contact-block">
      <h1>Contact</h1>
      <p class="contact-copy">
        For representation and all other enquiries:
      </p>
      <a class="email-link" href="mailto:office@budzinski.work">office@budzinski.work</a>
    </div>
  </main>

  <footer>
    <span class="footer-note">© Nate Budzinski</span>
    <span class="footer-note">Copenhagen</span>
  </footer>

</body>
</html>
